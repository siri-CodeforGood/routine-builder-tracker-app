<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Routines">
<meta name="theme-color" content="#6C63FF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="ati">
<title>My Routines</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p:#6C63FF;--pl:#EEF0FF;--bg:#F5F5FA;--card:#fff;
  --text:#1A1A2E;--sub:#888;--ok:#4CAF50;--red:#FF5252;
  --border:#EFEFEF;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:58px;
  --gutter:18px;
}
html{height:100%;overflow:hidden;background:#FAFAFC}/* matches tabbar for bottom bleed */
body{height:100%;overflow:hidden;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  font-size:17px;color:var(--text);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ─── Layout ─── */
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}
#screen{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);
}

/* ─── Tab bar ─── */
#tabbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(250,250,252,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.08);
  display:flex;
  padding-bottom:var(--safe-bot);
  z-index:100;
  height:calc(var(--tab-h) + var(--safe-bot));
}
/* fill any gap below the tabbar on iPhone (home indicator area) */
#tabbar::after{
  content:'';
  position:fixed;
  bottom:0;left:0;right:0;
  height:env(safe-area-inset-bottom, 0px);
  background:rgba(250,250,252,0.97);
  z-index:99;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 0 4px;cursor:pointer;gap:4px;
  min-height:44px;
}
.tab svg{width:26px;height:26px;transition:transform .2s,color .2s}
.tab span{font-size:11px;font-weight:600;letter-spacing:.2px;transition:color .2s}
.tab.active svg{transform:scale(1.08)}

/* ─── Sticky page header ─── */
.ph{
  padding:calc(var(--safe-top) + 20px) var(--gutter) 14px;
  display:flex;align-items:flex-end;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.ph h1{font-size:32px;font-weight:800;letter-spacing:-.5px}
.ph-sub{font-size:14px;color:var(--sub);margin-top:3px}
.fab{
  width:46px;height:46px;border-radius:23px;
  background:var(--p);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(108,99,255,.38);
  transition:transform .15s,box-shadow .15s;flex-shrink:0;
}
.fab:active{transform:scale(.9);box-shadow:0 2px 8px rgba(108,99,255,.3)}
.fab svg{width:22px;height:22px}

/* ─── Cards container ─── */
.cards{padding:4px var(--gutter) 0}

/* ─── Today header ─── */
.today-header{
  padding:calc(var(--safe-top) + 20px) var(--gutter) 8px;
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;
}
.today-greeting{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.today-date{font-size:15px;color:var(--sub);margin-top:4px;font-weight:500}
.today-pill{
  background:var(--p);color:#fff;font-weight:700;font-size:14px;
  padding:7px 14px;border-radius:22px;white-space:nowrap;flex-shrink:0;
  margin-top:4px;
  box-shadow:0 4px 12px rgba(108,99,255,.3);
}
.reset-btn{
  width:36px;height:36px;border-radius:18px;border:none;cursor:pointer;
  background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:4px;transition:background .15s,transform .15s;
}
.reset-btn:active{background:rgba(0,0,0,.12);transform:rotate(-45deg)}

/* ─── Routine cards (Today view) ─── */
.routine-card{
  background:var(--card);border-radius:22px;padding:20px;
  box-shadow:0 2px 16px rgba(0,0,0,.07);margin-bottom:16px;
}
.routine-card.all-done{border:2px solid var(--ok)}
.rc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rc-emoji{font-size:32px;flex-shrink:0;line-height:1}
.rc-meta{flex:1;min-width:0}
.rc-name{font-size:18px;font-weight:700;letter-spacing:-.2px}
.rc-time{font-size:13px;color:var(--sub);margin-top:3px;font-weight:500}
.rc-count{font-size:15px;font-weight:800;color:var(--p);white-space:nowrap}
.rc-count.done-count{color:var(--ok)}
.prog-bar{height:6px;background:#E8E8EE;border-radius:3px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:var(--p);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-fill.full{background:var(--ok)}

/* Task rows — 44px min tap target */
.task-row{
  display:flex;align-items:center;gap:14px;
  min-height:48px;padding:10px 0;
  border-top:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.task-row:active{opacity:.7}
.check-box{
  width:28px;height:28px;border-radius:8px;border:2px solid #C8C8D0;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .18s cubic-bezier(.4,0,.2,1);
}
.check-box.done{background:var(--p);border-color:var(--p)}
.task-label{flex:1;font-size:16px;font-weight:500;line-height:1.3}
.task-label.done-text{text-decoration:line-through;color:var(--sub)}
.all-done-label{
  text-align:center;color:var(--ok);font-weight:700;font-size:15px;
  margin-top:12px;padding-top:12px;border-top:1px solid var(--border);
}

/* ─── Routines list ─── */
.rl-card{
  background:var(--card);border-radius:20px;display:flex;align-items:center;
  box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden;
}
.rl-main{
  flex:1;display:flex;align-items:center;gap:16px;
  padding:18px var(--gutter);min-height:72px;cursor:pointer;
}
.rl-emoji{font-size:32px;line-height:1}
.rl-info{flex:1;min-width:0}
.rl-name{font-size:17px;font-weight:700;letter-spacing:-.2px}
.rl-meta{font-size:14px;color:var(--sub);margin-top:3px;font-weight:500}
.rl-del{padding:18px 16px;background:none;border:none;cursor:pointer;display:flex;align-items:center;min-height:72px}
.rl-del:active{opacity:.5}

/* ─── Habits ─── */
.hab-card{
  background:var(--card);border-radius:20px;
  display:flex;align-items:center;gap:16px;
  padding:18px;min-height:76px;
  box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:14px;
  cursor:pointer;transition:background .18s,transform .15s;
  -webkit-user-select:none;user-select:none;
}
.hab-card.done{background:var(--pl);border:2px solid rgba(108,99,255,.35)}
.hab-card:active{transform:scale(.975)}
.hab-emoji{font-size:32px;flex-shrink:0;line-height:1}
.hab-info{flex:1;min-width:0}
.hab-name{font-size:17px;font-weight:700;letter-spacing:-.2px}
.hab-name.done-h{color:var(--p)}
.hab-streak{font-size:14px;color:#FF7043;margin-top:4px;font-weight:600}
.hab-nostre{font-size:13px;color:var(--sub);margin-top:4px;font-weight:500}
.hab-circle{
  width:40px;height:40px;border-radius:20px;border:2px solid #C8C8D0;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .18s cubic-bezier(.4,0,.2,1);
}
.hab-circle.done{background:var(--p);border-color:var(--p)}

/* ─── Empty state ─── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:72px 40px;gap:14px;text-align:center;
}
.empty-icon{font-size:72px;opacity:.25}
.empty-title{font-size:22px;font-weight:700;color:var(--sub)}
.empty-sub{font-size:15px;color:#BBB;line-height:1.65;font-weight:500}
.empty-btn{
  margin-top:10px;background:var(--p);color:#fff;font-weight:700;
  font-size:16px;padding:16px 32px;border-radius:30px;border:none;cursor:pointer;
  box-shadow:0 6px 18px rgba(108,99,255,.35);
}
.empty-btn:active{transform:scale(.95)}

/* ─── Bottom sheet modal ─── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;align-items:flex-end;
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--card);
  border-radius:28px 28px 0 0;
  padding:8px 0 0;
  width:100%;
  padding-bottom:calc(24px + var(--safe-bot));
  max-height:93vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.32,0,.67,0);
}
/* drag handle */
#modal::before{
  content:'';display:block;
  width:40px;height:4px;border-radius:2px;background:#DDD;
  margin:8px auto 20px;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ─── Daily quote card ─── */
.quote-card{
  background:linear-gradient(135deg,#EEEEFF 0%,#F5F0FF 100%);
  border-radius:20px;padding:18px 20px 16px;margin-bottom:16px;position:relative;overflow:hidden;
}
.quote-card::before{
  content:'\201C';font-size:72px;line-height:1;color:var(--p);opacity:.15;
  position:absolute;top:-4px;left:10px;font-family:Georgia,serif;
}
.quote-text{font-size:14px;font-style:italic;line-height:1.65;color:var(--text);padding-left:4px;margin-bottom:10px}
.quote-author{font-size:12px;font-weight:700;color:var(--p);text-align:right}

/* ─── Toast notification ─── */
#toast{
  position:fixed;
  bottom:calc(var(--tab-h) + var(--safe-bot) + 16px);
  left:50%;transform:translateX(-50%) translateY(24px);
  background:rgba(26,26,46,.93);color:#fff;
  padding:13px 22px;border-radius:18px;
  font-size:14px;font-weight:600;line-height:1.4;
  max-width:88vw;text-align:center;
  opacity:0;transition:opacity .28s ease,transform .28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;z-index:9999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-inner{padding:0 22px}
.modal-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:22px}
.field-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.emoji-pick-btn{
  width:56px;height:56px;border-radius:16px;
  background:var(--bg);border:none;font-size:30px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
input[type=text],input[type=time]{
  flex:1;border:none;border-bottom:2px solid var(--border);
  font-size:18px;font-family:inherit;color:var(--text);
  padding:10px 0;background:transparent;outline:none;font-weight:500;
}
input[type=text]:focus,input[type=time]:focus{border-bottom-color:var(--p)}
input[type=time]{font-size:17px}
.emoji-grid{display:flex;flex-wrap:wrap;margin-bottom:16px}
.eg-btn{font-size:30px;padding:7px;background:none;border:none;cursor:pointer}
.switch-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;min-height:44px}
.switch-row label{flex:1;font-size:17px;font-weight:600}
.switch-row .tog{flex:none}
.tog{position:relative;width:52px;height:30px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-slider{position:absolute;inset:0;background:#CCC;border-radius:15px;cursor:pointer;transition:.3s}
.tog-slider::before{
  content:'';position:absolute;width:24px;height:24px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.tog input:checked+.tog-slider{background:var(--p)}
.tog input:checked+.tog-slider::before{transform:translateX(22px)}
.time-wrap{margin-bottom:18px}
.time-label{font-size:14px;color:var(--sub);margin-bottom:8px;font-weight:500}
.task-list-edit{margin-bottom:16px}
.task-edit-row{
  display:flex;align-items:center;gap:12px;
  min-height:48px;padding:10px 0;border-bottom:1px solid var(--border);
}
.task-edit-row span{flex:1;font-size:16px;font-weight:500}
.task-rm{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:#CCC;padding:0 6px;min-height:44px;display:flex;align-items:center;
}
.add-task-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.add-task-row input{flex:1}
.add-task-btn{
  width:38px;height:38px;border-radius:19px;
  background:var(--pl);border:none;cursor:pointer;
  font-size:24px;color:var(--p);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.modal-btns{display:flex;gap:12px;margin-top:20px}
.btn-cancel{
  flex:1;padding:17px;border-radius:18px;
  background:var(--bg);border:none;font-size:17px;font-weight:700;
  color:var(--sub);cursor:pointer;font-family:inherit;
}
.btn-save{
  flex:1;padding:17px;border-radius:18px;
  background:var(--p);border:none;font-size:17px;font-weight:700;
  color:#fff;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 18px rgba(108,99,255,.38);
}
.btn-cancel:active{opacity:.7}
.btn-save:active{transform:scale(.97)}

/* ─── Reminder tip banner ─── */
.reminder-note{
  background:var(--pl);border-radius:16px;
  padding:14px var(--gutter);margin:0 var(--gutter) 16px;
  font-size:14px;color:var(--p);line-height:1.55;font-weight:500;
}

/* ─── Section label ─── */
.section-head{font-size:20px;font-weight:700;padding:0 22px;margin:8px 0 14px;letter-spacing:-.3px}

/* ─── Meal Planner ─── */
.week-toggle{
  display:flex;gap:8px;padding:12px var(--gutter) 4px;
}
.week-btn{
  flex:1;padding:12px;border-radius:14px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;font-family:inherit;
  background:var(--card);color:var(--sub);
  box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;
}
.week-btn.active{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,.35)}
.meal-day-card{
  background:var(--card);border-radius:20px;
  margin-bottom:14px;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.07);
}
.meal-day-card.is-today{border:2px solid var(--p)}
.meal-day-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;border-bottom:1px solid var(--border);
}
.meal-day-name{font-size:17px;font-weight:800;letter-spacing:-.2px}
.meal-day-date{font-size:13px;color:var(--sub);font-weight:500;margin-top:2px}
.today-tag{
  background:var(--p);color:#fff;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:10px;letter-spacing:.3px;
}
.meal-slot{
  display:flex;align-items:center;gap:14px;
  padding:13px 18px;cursor:pointer;min-height:52px;
  border-bottom:1px solid var(--border);transition:background .15s;
}
.meal-slot:last-child{border-bottom:none}
.meal-slot:active{background:var(--bg)}
.meal-slot-icon{font-size:20px;flex-shrink:0;width:26px;text-align:center}
.meal-slot-info{flex:1;min-width:0}
.meal-slot-label{font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.meal-slot-text{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-slot-text.empty{color:#C0C0C8;font-style:italic}
.meal-slot-arr{color:#D0D0D8;font-size:16px;flex-shrink:0}

/* ─── Tasks tab ─── */
.task-item{
  background:var(--card);border-radius:18px;
  display:flex;align-items:flex-start;gap:14px;
  padding:16px 18px;min-height:64px;
  box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:12px;
  -webkit-user-select:none;user-select:none;
  transition:background .15s;
}
.task-item:active{background:#F0F0F8}
.task-item.done-item{opacity:.5}
.task-item.overdue-item{border-left:3px solid var(--red)}
.t-check{
  width:26px;height:26px;border-radius:13px;border:2px solid #C8C8D0;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  margin-top:1px;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);
}
.t-check.done{background:var(--ok);border-color:var(--ok)}
.t-body{flex:1;min-width:0;cursor:pointer}
.t-name{font-size:16px;font-weight:600;line-height:1.3}
.t-name.done-t{text-decoration:line-through;color:var(--sub)}
.t-meta{font-size:13px;margin-top:4px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.t-due{color:var(--sub)}
.t-due.t-overdue{color:var(--red);font-weight:700}
.t-due.t-today{color:var(--p);font-weight:700}
.t-flag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px;letter-spacing:.3px;white-space:nowrap}
.t-flag-high{background:#FFF0F0;color:var(--red)}
.t-flag-med{background:#FFF4E0;color:#D4700A}
.t-flag-low{background:#F0FFF4;color:#2E7D32}
/* priority selector buttons */
.pri-btn{flex:1;padding:10px 4px;border-radius:12px;border:2px solid var(--border);background:var(--bg);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub);transition:all .15s}
.pri-btn.active-none{border-color:var(--sub);color:var(--sub);background:var(--bg)}
.pri-btn.active-low{border-color:#2E7D32;color:#2E7D32;background:#F0FFF4}
.pri-btn.active-med{border-color:#D4700A;color:#D4700A;background:#FFF4E0}
.pri-btn.active-high{border-color:var(--red);color:var(--red);background:#FFF0F0}
.t-del{background:none;border:none;cursor:pointer;color:#CCC;padding:2px 0 2px 8px;font-size:22px;line-height:1;display:flex;align-items:center;flex-shrink:0}
.t-del:active{color:var(--red)}
.t-edit{background:none;border:none;cursor:pointer;color:#CCC;padding:2px 4px 2px 6px;display:flex;align-items:center;flex-shrink:0}
.t-edit:active{color:var(--p)}
.tsec-head{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;padding:0 2px;margin:14px 0 8px}
.tsec-head.tsec-overdue{color:var(--red)}
.tsec-head.tsec-ok{color:var(--ok)}

/* ─── Calendar button ─── */
.cal-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:4px 8px;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;white-space:nowrap;font-family:inherit;line-height:1.4;transition:all .15s}
.cal-btn:active{background:var(--pl);color:var(--p);border-color:var(--p)}

/* ─── Sage action confirm ─── */
.action-confirm{display:flex;gap:8px;margin-top:10px}
.btn-confirm{flex:1;padding:11px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;background:var(--p);color:#fff}
.btn-confirm:active{opacity:.8}
.btn-reject{flex:1;padding:11px;border-radius:14px;border:2px solid var(--border);cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;background:var(--bg);color:var(--sub)}
.btn-reject:active{opacity:.7}
.action-done{margin-top:8px;font-size:13px;font-weight:700;color:var(--ok)}
.action-cancelled{margin-top:8px;font-size:13px;font-weight:600;color:var(--sub)}

/* ─── Report ─── */
.rpt-sec{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.rpt-pill{padding:8px 18px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;white-space:nowrap;background:var(--bg);color:var(--sub);transition:all .2s;flex-shrink:0}
.rpt-pill.active{background:var(--p);color:#fff;box-shadow:0 4px 12px rgba(108,99,255,.3)}

/* ─── Mind / Chat tab ─── */
.chat-msgs{
  padding:8px var(--gutter) 80px;
  display:flex;flex-direction:column;gap:12px;
}
.chat-bubble-wrap{display:flex;align-items:flex-end;gap:8px}
.chat-bubble-wrap.user{flex-direction:row-reverse}
.chat-bubble{
  max-width:80%;padding:12px 16px;border-radius:20px;
  font-size:15px;line-height:1.55;font-weight:500;
}
.chat-bubble.user{
  background:var(--p);color:#fff;
  border-bottom-right-radius:6px;
}
.chat-bubble.ai{
  background:var(--card);color:var(--text);
  border-bottom-left-radius:6px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.chat-avatar{
  width:32px;height:32px;border-radius:16px;
  background:linear-gradient(135deg,#6C63FF,#A78BFA);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.typing-dot{
  display:inline-block;width:8px;height:8px;
  border-radius:4px;background:#BBB;
  margin:0 2px;
  animation:typBounce 1.2s infinite ease-in-out;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typBounce{
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-7px)}
}
.chat-input-bar{
  position:sticky;bottom:0;
  display:flex;align-items:flex-end;gap:10px;
  padding:10px var(--gutter) calc(10px + var(--safe-bot));
  background:rgba(245,245,250,.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.06);
}
.chat-textarea{
  flex:1;border:2px solid var(--border);border-radius:22px;
  padding:10px 16px;font-size:16px;font-family:inherit;
  color:var(--text);background:var(--card);outline:none;
  resize:none;max-height:120px;line-height:1.4;overflow-y:auto;
  transition:border-color .2s;
}
.chat-textarea:focus{border-color:var(--p)}
.chat-send-btn{
  width:44px;height:44px;border-radius:22px;
  background:var(--p);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 4px 14px rgba(108,99,255,.38);
  transition:transform .15s,opacity .15s;
}
.chat-send-btn:disabled{opacity:.35;box-shadow:none;cursor:default}
.chat-send-btn:active:not(:disabled){transform:scale(.88)}
.mind-setup{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 28px 32px;gap:14px;text-align:center;
}
.mind-setup-icon{font-size:72px;margin-bottom:4px}
.mind-setup-title{font-size:26px;font-weight:800;letter-spacing:-.4px}
.mind-setup-sub{font-size:15px;color:var(--sub);line-height:1.65}
.mind-key-input{
  width:100%;padding:14px 18px;border-radius:16px;
  border:2px solid var(--border);font-size:15px;
  font-family:inherit;color:var(--text);background:var(--card);
  outline:none;margin-top:4px;letter-spacing:.05em;
}
.mind-key-input:focus{border-color:var(--p)}
</style>

<script>
// ─── State & Storage ───────────────────────────────────────────────────────────
const S = {
  tab: 'today',
  routines: [],
  habits: [],
  completions: {},
  meals: {},
  mealWeek: 0,
  tasks: [],
  notifHabitTime: '20:00',
  geminiKey: '',
  chatMessages: [],
};

function loadData() {
  S.routines     = JSON.parse(localStorage.getItem('routines')     || '[]');
  S.habits       = JSON.parse(localStorage.getItem('habits')       || '[]');
  S.completions  = JSON.parse(localStorage.getItem('completions')  || '{}');
  S.meals        = JSON.parse(localStorage.getItem('meals')        || '{}');
  S.tasks           = JSON.parse(localStorage.getItem('tasks')           || '[]');
  S.notifHabitTime  = localStorage.getItem('notifHabitTime')              || '20:00';
  S.geminiKey       = localStorage.getItem('geminiKey')                   || '';
  S.openaiKey       = localStorage.getItem('openaiKey')                   || '';
  S.aiProvider      = localStorage.getItem('aiProvider')                  || 'gemini';
  S.chatMessages    = JSON.parse(localStorage.getItem('chatMessages')     || '[]');
  // migrate old single-string meal values → arrays
  Object.values(S.meals).forEach(day => {
    ['breakfast','lunch','dinner'].forEach(slot => {
      if (typeof day[slot] === 'string') day[slot] = [day[slot]];
    });
  });
}

function persist() {
  localStorage.setItem('routines',    JSON.stringify(S.routines));
  localStorage.setItem('habits',      JSON.stringify(S.habits));
  localStorage.setItem('completions', JSON.stringify(S.completions));
  localStorage.setItem('meals',       JSON.stringify(S.meals));
  localStorage.setItem('tasks',          JSON.stringify(S.tasks));
  localStorage.setItem('notifHabitTime', S.notifHabitTime);
  localStorage.setItem('geminiKey',      S.geminiKey);
  localStorage.setItem('openaiKey',      S.openaiKey);
  localStorage.setItem('aiProvider',     S.aiProvider);
  localStorage.setItem('chatMessages',   JSON.stringify(S.chatMessages));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── Streak ────────────────────────────────────────────────────────────────────
function calcStreak(dates) {
  if (!dates.length) return 0;
  const today = todayKey();
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const k = dateKey(d);
    if (dates.includes(k)) {
      streak++;
    } else if (i === 0) {
      // didn't do today yet — check yesterday
    } else {
      break;
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ─── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab').forEach(el => {
    const active = el.dataset.tab === tab;
    el.classList.toggle('active', active);
    const svg  = el.querySelector('svg');
    const span = el.querySelector('span');
    svg.style.color  = active ? 'var(--p)' : 'var(--sub)';
    span.style.color = active ? 'var(--p)' : 'var(--sub)';
  });
  render();
}

// ─── Render ────────────────────────────────────────────────────────────────────
function render() {
  const screen = document.getElementById('screen');
  if (S.tab !== 'mind') screen.scrollTop = 0;
  if (S.tab === 'today')    screen.innerHTML = renderToday();
  if (S.tab === 'routines') screen.innerHTML = renderRoutines();
  if (S.tab === 'habits')   screen.innerHTML = renderHabits();
  if (S.tab === 'meals') {
    // auto-select the week that contains today
    S.mealWeek = mealCycleWeek() - 1; // 0 = Week1, 1 = Week2
    screen.innerHTML = renderMeals();
    // scroll to today's card after paint
    requestAnimationFrame(() => {
      const todayCard = screen.querySelector('.meal-day-card.is-today');
      if (todayCard) todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
  if (S.tab === 'tasks')    screen.innerHTML = renderTasks();
  if (S.tab === 'mind') {
    screen.innerHTML = renderMind();
    scrollChatToBottom();
  }
}

// ─── Daily Quotes ──────────────────────────────────────────────────────────────

function getDailyQuote() {
  const now   = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const day   = Math.floor((now - start) / 86400000);
  return QUOTES[day % QUOTES.length];
}

// ─── Today ─────────────────────────────────────────────────────────────────────
function renderToday() {
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now    = new Date();
  const h      = now.getHours();
  const greeting = h < 12 ? 'Good morning 👋' : h < 17 ? 'Good afternoon 👋' : 'Good evening 👋';
  const dateStr  = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  const today = todayKey();
  const comp  = S.completions[today] || {};
  const total = S.routines.reduce((s, r) => s + r.tasks.length, 0);
  const done  = S.routines.reduce((s, r) =>
    s + r.tasks.filter(t => comp[r.id]?.[t.id]).length, 0);

  let html = `<div class="today-header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <div class="today-greeting">${greeting}</div>
        <div class="today-date">${dateStr}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button class="reset-btn" onclick="openSettingsModal()" title="Settings & Backup">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        ${done > 0 ? `<button class="reset-btn" onclick="resetToday()" title="Reset all tasks">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>` : ''}
        ${total > 0 ? `<div class="today-pill">${done}/${total} done</div>` : ''}
      </div>
    </div>
  </div>
  <div class="cards" style="padding-top:16px">`;

  const q = getDailyQuote();
  html += `<div class="quote-card">
    <div class="quote-text">${q.q}</div>
    <div class="quote-author">— ${q.a}</div>
  </div>`;

  const todayTasks = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate <= today);
  if (todayTasks.length > 0) {
    html += `<div class="tsec-head" style="margin-top:4px">🎯 Tasks due today</div>`;
    todayTasks.forEach(t => { html += taskItemHTML(t, today); });
    html += `<div style="height:4px"></div>`;
  }

  if (S.routines.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Nothing planned yet</div>
      <div class="empty-sub">Go to the Routines tab to create your first daily routine.</div>
    </div>`;
  } else {
    S.routines.forEach(r => {
      const rdone = r.tasks.filter(t => comp[r.id]?.[t.id]).length;
      const rtotal = r.tasks.length;
      const pct = rtotal ? rdone / rtotal : 0;
      const allDone = rtotal > 0 && rdone === rtotal;

      html += `<div class="routine-card ${allDone ? 'all-done' : ''}">
        <div class="rc-head">
          <span class="rc-emoji">${r.emoji}</span>
          <div class="rc-meta">
            <div class="rc-name">${esc(r.name)}</div>
            ${r.reminderTime ? `<div class="rc-time">⏰ ${r.reminderTime}</div>` : ''}
          </div>
          <span class="rc-count ${allDone ? 'done-count' : ''}">${rdone}/${rtotal}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill ${allDone ? 'full' : ''}" style="width:${pct*100}%"></div></div>`;

      r.tasks.forEach(t => {
        const isDone = !!comp[r.id]?.[t.id];
        html += `<div class="task-row" onclick="toggleTask('${r.id}','${t.id}')">
          <div class="check-box ${isDone ? 'done' : ''}">
            ${isDone ? '<svg width="13" height="13" viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
          </div>
          <span class="task-label ${isDone ? 'done-text' : ''}">${esc(t.name)}</span>
        </div>`;
      });

      if (allDone) html += `<div class="all-done-label">✅ All done!</div>`;
      html += `</div>`;
    });
  }

  html += `</div>`;
  return html;
}

function toggleTask(routineId, taskId) {
  const today = todayKey();
  if (!S.completions[today]) S.completions[today] = {};
  if (!S.completions[today][routineId]) S.completions[today][routineId] = {};
  S.completions[today][routineId][taskId] = !S.completions[today][routineId][taskId];
  persist();
  render();
}

function resetToday() {
  if (!confirm('Reset all checkboxes for today?')) return;
  delete S.completions[todayKey()];
  persist();
  render();
}

// ─── Routines ──────────────────────────────────────────────────────────────────
function renderRoutines() {
  let html = `<div class="ph">
    <h1 style="font-size:30px;font-weight:800">Routines</h1>
    <button class="fab" onclick="openRoutineModal(null)" title="Add routine">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="reminder-note">
    💡 Set a reminder time on each routine. Add it to iOS Reminders or use a Shortcut to get a daily ping.
  </div>
  <div class="cards">`;

  if (S.routines.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No routines yet</div>
      <div class="empty-sub">Create a routine with tasks and an optional reminder time.</div>
      <button class="empty-btn" onclick="openRoutineModal(null)">+ Create Routine</button>
    </div>`;
  } else {
    S.routines.forEach(r => {
      html += `<div class="rl-card">
        <div class="rl-main" onclick="openRoutineModal('${r.id}')">

// ─── Meal Planner ──────────────────────────────────────────────────────────────
const MEAL_SLOTS = [
  { key: 'breakfast', label: 'Breakfast', icon: '🌅' },
  { key: 'lunch',     label: 'Lunch',     icon: '☀️' },
  { key: 'dinner',    label: 'Dinner',    icon: '🌙' },
];
const DAY_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getWeekDates(weekOffset) {
  const dates = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(today);
  start.setDate(today.getDate() + weekOffset * 7);
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Which week of the 2-week cycle is "this week" (1 or 2)
function mealCycleWeek() {
  return Math.floor(Date.now() / (7 * 86400000)) % 2 === 0 ? 1 : 2;
}
// Today's day-of-week index: 0=Mon … 6=Sun
function todayDow() {
  return (new Date().getDay() + 6) % 7;
}

const MEAL_DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// Returns the actual Date for a given template weekNum (1|2) and dow (0=Mon…6=Sun)
function mealDayDate(weekNum, dow) {
  const cycleWeek = mealCycleWeek();
  const today = new Date(); today.setHours(0,0,0,0);
  // Monday of current week
  const monday = new Date(today);
  monday.setDate(today.getDate() - todayDow());
  // weekNum === cycleWeek → this week; otherwise next week
  const weekOffset = (weekNum === cycleWeek) ? 0 : 7;
  const d = new Date(monday);
  d.setDate(monday.getDate() + weekOffset + dow);
  return d;
}

function renderMeals() {
  const cycleWeek  = mealCycleWeek();
  const todDow     = todayDow();
  const weekNum    = S.mealWeek + 1; // 1 or 2
  const isThisWeek = weekNum === cycleWeek;

  let html = `
  <div class="ph">
    <div>
      <h1 style="font-size:32px;font-weight:800;letter-spacing:-.5px">Meal Plan</h1>
      <div style="font-size:14px;color:var(--sub);margin-top:3px">2-week repeating template</div>
    </div>
  </div>
  <div class="week-toggle">
    <button class="week-btn ${S.mealWeek===0?'active':''}" onclick="setMealWeek(0)">Week 1</button>
    <button class="week-btn ${S.mealWeek===1?'active':''}" onclick="setMealWeek(1)">Week 2</button>
  </div>
  <div class="cards" style="padding-top:12px">`;

  for (let dow = 0; dow < 7; dow++) {
    const key      = `w${weekNum}-${dow}`;
    const isToday  = isThisWeek && dow === todDow;
    const dayMeals = S.meals[key] || {};

    const mDate    = mealDayDate(weekNum, dow);
    const dateStr  = `${MONTH_SHORT[mDate.getMonth()]} ${mDate.getDate()}`;

    html += `<div class="meal-day-card ${isToday ? 'is-today' : ''}">
      <div class="meal-day-head">
        <div>
          <div class="meal-day-name">${MEAL_DAY_NAMES[dow]}</div>
          <div class="meal-day-date">${dateStr}</div>
        </div>
        ${isToday ? '<span class="today-tag">TODAY</span>' : ''}
      </div>`;

    MEAL_SLOTS.forEach(slot => {
      const raw   = dayMeals[slot.key];
      const items = Array.isArray(raw) ? raw : (raw ? [raw] : []);
      const isEmpty = items.length === 0;
      const preview = items.length > 1
        ? `${esc(items[0])} <span style="color:var(--sub);font-size:13px">+${items.length-1} more</span>`
        : (isEmpty ? '' : esc(items[0]));
      html += `<div class="meal-slot" onclick="openMealEdit('${key}','${slot.key}','${slot.label}')">
        <span class="meal-slot-icon">${slot.icon}</span>
        <div class="meal-slot-info">
          <div class="meal-slot-label">${slot.label}</div>
          <div class="meal-slot-text ${isEmpty ? 'empty' : ''}">${isEmpty ? 'Tap to add…' : preview}</div>
        </div>
        <span class="meal-slot-arr">›</span>
      </div>`;
    });

    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function setMealWeek(w) {
  S.mealWeek = w;
  render();
}

function openMealEdit(dateKey, slotKey, slotLabel) {

// ── helpers ──
function rptDays(n) {
  const out = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    out.push(dateKey(d));
  }
  return out;
}

function rptMonths(n) {
  const out = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    out.push({ y: d.getFullYear(), m: d.getMonth(), label: MONTH_SHORT[d.getMonth()] });
  }
  return out;
}

function daysInMonth(y, m) {
  return new Date(y, m+1, 0).getDate();
}

function monthDayKeys(y, m) {
  const keys = [];
  for (let d = 1; d <= daysInMonth(y, m); d++)
    keys.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  return keys;
}

function colorPct(pct) {
  return pct >= 70 ? 'var(--ok)' : pct >= 40 ? 'var(--p)' : 'var(--sub)';
}

function barChart(values, labels, color, maxH=48) {
  const mx = Math.max(...values, 1);
  return `
    <div style="display:flex;gap:4px;align-items:flex-end;height:${maxH}px;margin-bottom:3px">
      ${values.map(v => {
        const h = Math.max(Math.round(v/mx*maxH), v>0?3:0);
        return `<div style="flex:1;background:${color};border-radius:3px 3px 0 0;height:${h}px;opacity:.85"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:4px;margin-bottom:14px">
      ${labels.map(l => `<div style="flex:1;text-align:center;font-size:9px;color:var(--sub);font-weight:600;overflow:hidden">${l}</div>`).join('')}
    </div>`;
}

function habitProgressRow(h, pct) {
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <span style="font-size:16px;width:22px;flex-shrink:0">${h.emoji}</span>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%">${esc(h.name)}</span>
        <span style="font-size:13px;font-weight:700;color:${colorPct(pct)}">${pct}%</span>
      </div>
      <div style="height:6px;background:#E8E8EE;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${colorPct(pct)};border-radius:3px"></div>
      </div>
    </div>
  </div>`;
}

function tasksBlock(label='Tasks') {
  const today = todayKey();
  const done    = S.tasks.filter(t => t.done).length;
  const pending = S.tasks.filter(t => !t.done).length;
  const overdue = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate < today).length;
  const high    = S.tasks.filter(t => !t.done && t.priority==='high').length;
  return `<div class="rpt-sec" style="margin-top:20px">${label}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:var(--bg);border-radius:16px;padding:16px;text-align:center">
      <div style="font-size:32px;font-weight:800;color:var(--ok);line-height:1">${done}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:6px;font-weight:600">Completed</div>
    </div>
    <div style="background:var(--bg);border-radius:16px;padding:16px;text-align:center">
      <div style="font-size:32px;font-weight:800;color:${overdue>0?'var(--red)':'var(--text)'};line-height:1">${pending}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:6px;font-weight:600">Pending${overdue>0?`<br><span style="color:var(--red)">${overdue} overdue</span>`:''}</div>
    </div>
    ${high>0?`<div style="background:#FFF0F0;border-radius:16px;padding:12px 16px;text-align:center;grid-column:1/-1">
      <div style="font-size:13px;font-weight:700;color:var(--red)">⚑ ${high} high-priority pending</div>
    </div>`:''}
  </div>`;
}

function streakBlock() {
  if (!S.habits.length) return '';
  const best = [...S.habits].sort((a,b) => calcStreak(b.completedDates)-calcStreak(a.completedDates))[0];
  const s = calcStreak(best.completedDates);
  if (!s) return '';
  return `<div style="background:var(--pl);border-radius:16px;padding:16px;text-align:center;margin-top:10px">
    <div style="font-size:26px">${best.emoji}</div>
    <div style="font-size:13px;font-weight:700;color:var(--p);margin-top:6px">🔥 ${s}-day streak</div>
    <div style="font-size:12px;color:var(--sub);margin-top:2px">${esc(best.name)}</div>
  </div>`;
}

// ── WEEK ──
function buildRptWeek() {
  const days = rptDays(7);
  const labels = days.map(dk => DAY_SHORT[new Date(dk+'T00:00:00').getDay()]);
  let html = '';

  if (S.habits.length) {
    html += `<div class="rpt-sec">Habits — Last 7 Days</div>
    <div style="display:flex;gap:4px;padding-left:32px;margin-bottom:5px">
      ${labels.map(l=>`<div style="flex:1;text-align:center;font-size:10px;color:var(--sub);font-weight:600">${l}</div>`).join('')}
    </div>`;
    S.habits.forEach(h => {
      const dots = days.map(dk => h.completedDates.includes(dk));
      const count = dots.filter(Boolean).length;
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:17px;width:24px;flex-shrink:0">${h.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--sub);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(h.name)}</div>
          <div style="display:flex;gap:4px">
            ${dots.map(d=>`<div style="flex:1;height:20px;border-radius:5px;background:${d?'var(--ok)':'#E8E8EE'}"></div>`).join('')}
          </div>
        </div>
        <div style="font-size:13px;font-weight:700;color:${colorPct(Math.round(count/7*100))};min-width:28px;text-align:right">${count}/7</div>
      </div>`;
    });
  }

  if (S.routines.length && S.routines.some(r=>r.tasks.length)) {
    const stats = days.map(dk => {
      const comp = S.completions[dk]||{};
      const total = S.routines.reduce((s,r)=>s+r.tasks.length,0);
      const done  = S.routines.reduce((s,r)=>s+r.tasks.filter(t=>comp[r.id]?.[t.id]).length,0);
      return {done,total};
    });
    const wTotal = stats.reduce((s,d)=>s+d.total,0);
    const wDone  = stats.reduce((s,d)=>s+d.done, 0);
    const pct    = wTotal ? Math.round(wDone/wTotal*100) : 0;
    html += `<div class="rpt-sec" style="margin-top:20px">Routines — This Week</div>
    <div style="background:var(--bg);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <div style="font-size:38px;font-weight:800;color:${colorPct(pct)};line-height:1">${pct}%</div>
      <div><div style="font-size:15px;font-weight:700">Task completion</div>
        <div style="font-size:13px;color:var(--sub);margin-top:3px">${wDone} of ${wTotal} tasks</div></div>
    </div>
    ${barChart(stats.map(d=>d.total?d.done/d.total:0), labels, 'var(--p)')}`;
  }

  html += tasksBlock('Tasks') + streakBlock() + `<div style="height:8px"></div>`;
  return html;
}

// ── MONTH ──
function buildRptMonth() {
  const days = rptDays(30);
  let html = '';

  if (S.habits.length) {
    html += `<div class="rpt-sec">Habits — Last 30 Days</div>`;
    S.habits.forEach(h => {
      const done = days.filter(dk => h.completedDates.includes(dk)).length;
      const pct  = Math.round(done/30*100);
      html += `<div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:6px">
          ${days.map(dk => `<div style="width:calc((100% - ${29*4}px)/30);height:14px;border-radius:3px;min-width:7px;background:${h.completedDates.includes(dk)?'var(--ok)':'#E8E8EE'}"></div>`).join('')}
        </div>
        ${habitProgressRow(h, pct)}
      </div>`;
    });
  }

  if (S.routines.length && S.routines.some(r=>r.tasks.length)) {
    // Group into 4-5 weeks
    const weeks = [[],[],[],[]];
    days.forEach((dk,i) => weeks[Math.floor(i/7)%4].push(dk));
    const wStats = weeks.map(wk => {
      let done=0, total=0;
      wk.forEach(dk => {
        const comp = S.completions[dk]||{};
        S.routines.forEach(r => {
          total += r.tasks.length;
          done  += r.tasks.filter(t=>comp[r.id]?.[t.id]).length;
        });
      });
      return {done, total, pct: total?Math.round(done/total*100):0};
    });
    const mTotal = wStats.reduce((s,w)=>s+w.total,0);
    const mDone  = wStats.reduce((s,w)=>s+w.done, 0);
    const pct    = mTotal ? Math.round(mDone/mTotal*100) : 0;
    html += `<div class="rpt-sec" style="margin-top:20px">Routines — This Month</div>
    <div style="background:var(--bg);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <div style="font-size:38px;font-weight:800;color:${colorPct(pct)};line-height:1">${pct}%</div>
      <div><div style="font-size:15px;font-weight:700">Task completion</div>
        <div style="font-size:13px;color:var(--sub);margin-top:3px">${mDone} of ${mTotal} tasks</div></div>
    </div>
    ${barChart(wStats.map(w=>w.pct), ['Wk 1','Wk 2','Wk 3','Wk 4'], 'var(--p)')}`;
  }

  html += tasksBlock('Tasks') + streakBlock() + `<div style="height:8px"></div>`;
  return html;
}

// ── N-MONTH (shared for 3M / 6M / 9M / Year) ──
function buildRptMonthly(n) {
  const months = rptMonths(n);
  const label  = n === 12 ? 'This Year' : `Last ${n} Months`;
  let html = '';

  if (S.habits.length) {
    const monthAvg = months.map(({y,m}) => {
      const keys = monthDayKeys(y,m);
      const avg  = S.habits.reduce((s,h) => {
        const done = keys.filter(dk=>h.completedDates.includes(dk)).length;
        return s + Math.round(done/keys.length*100);
      }, 0) / S.habits.length;
      return Math.round(avg);
    });

    html += `<div class="rpt-sec">Habits — ${label}</div>
    ${barChart(monthAvg, months.map(m=>m.label), 'var(--ok)')}`;

    // Per-habit %
    html += S.habits.map(h => {
      const allKeys = months.flatMap(({y,m})=>monthDayKeys(y,m));
      const done    = allKeys.filter(dk=>h.completedDates.includes(dk)).length;
      return habitProgressRow(h, Math.round(done/allKeys.length*100));
    }).join('') + `<div style="height:4px"></div>`;
  }

  if (S.routines.length && S.routines.some(r=>r.tasks.length)) {
    const mStats = months.map(({y,m}) => {
      let done=0, total=0;
      monthDayKeys(y,m).forEach(dk => {
        const comp = S.completions[dk]||{};
        S.routines.forEach(r => {
          total += r.tasks.length;
          done  += r.tasks.filter(t=>comp[r.id]?.[t.id]).length;
        });
      });
      return {done, total, pct: total?Math.round(done/total*100):0};
    });
    const yTotal = mStats.reduce((s,m)=>s+m.total,0);
    const yDone  = mStats.reduce((s,m)=>s+m.done, 0);
    const pct    = yTotal ? Math.round(yDone/yTotal*100) : 0;
    html += `<div class="rpt-sec" style="margin-top:4px">Routines — ${label}</div>
    <div style="background:var(--bg);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <div style="font-size:38px;font-weight:800;color:${colorPct(pct)};line-height:1">${pct}%</div>
      <div><div style="font-size:15px;font-weight:700">Task completion</div>
        <div style="font-size:13px;color:var(--sub);margin-top:3px">${yDone} of ${yTotal} tasks</div></div>
    </div>
    ${barChart(mStats.map(m=>m.pct), months.map(m=>m.label), 'var(--p)')}`;
  }

  html += tasksBlock('Tasks — All Time') + streakBlock() + `<div style="height:8px"></div>`;
  return html;
}

function buildRpt(period) {
  if (period === 'week')  return buildRptWeek();
  if (period === 'month') return buildRptMonth();
  if (period === '3m')    return buildRptMonthly(3);
  if (period === '6m')    return buildRptMonthly(6);
  if (period === '9m')    return buildRptMonthly(9);
  if (period === 'year')  return buildRptMonthly(12);
  return buildRptWeek();
}

// ─── Tasks ────────────────────────────────────────────────────────────────────
function fmt12(hhmm) {
  if (!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function priorityBadge(p) {
  if (p === 'high')   return '<span class="t-flag t-flag-high">HIGH</span>';
  if (p === 'medium') return '<span class="t-flag t-flag-med">MED</span>';
  if (p === 'low')    return '<span class="t-flag t-flag-low">LOW</span>';
  return '';
}

function taskItemHTML(t, todayStr) {
  const today = todayStr || todayKey();
  const isOverdue = !t.done && t.dueDate && t.dueDate < today;
  const isToday   = !t.done && t.dueDate === today;
  let dueLabel = '';
  if (t.dueDate) {
    const d = new Date(t.dueDate + 'T00:00:00');
    const timeStr = t.dueTime ? ` · ${fmt12(t.dueTime)}` : '';
    if (isOverdue) {
      const days = Math.round((new Date(today + 'T00:00:00') - d) / 86400000);
      dueLabel = `${days} day${days!==1?'s':''} overdue${timeStr}`;
    } else if (isToday) {
      dueLabel = `Due today${timeStr}`;
    } else {
      dueLabel = `Due ${MONTH_SHORT[d.getMonth()]} ${d.getDate()}${timeStr}`;
    }
  }
  return `<div class="task-item ${t.done?'done-item':''} ${isOverdue?'overdue-item':''}">
    <div class="t-check ${t.done?'done':''}" onclick="toggleTaskDone('${t.id}')">
      ${t.done?'<svg width="13" height="13" viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
    </div>
    <div class="t-body" onclick="toggleTaskDone('${t.id}')">
      <div class="t-name ${t.done?'done-t':''}">${esc(t.name)}</div>
      <div class="t-meta">
        ${dueLabel?`<span class="t-due ${isOverdue?'t-overdue':''} ${isToday?'t-today':''}">${dueLabel}</span>`:''}
        ${priorityBadge(t.priority)}
      </div>
    </div>
    <button class="cal-btn" onclick="addTaskToCalendar('${t.id}')" title="Add to Calendar">📅</button>
    <button class="t-edit" onclick="editTask('${t.id}')" title="Edit">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
    </button>
    <button class="t-del" onclick="deleteTask('${t.id}','${esc(t.name)}')">×</button>
  </div>`;
}

function renderTasks() {
  const today = todayKey();
  const active = S.tasks.filter(t => !t.done);
  const done   = S.tasks.filter(t =>  t.done);
  const overdue  = active.filter(t => t.dueDate && t.dueDate < today);
  const dueToday = active.filter(t => t.dueDate === today);
  const upcoming = active.filter(t => t.dueDate && t.dueDate > today);
  const noDate   = active.filter(t => !t.dueDate);

  let html = `<div class="ph">
    <div>
      <h1 style="font-size:30px;font-weight:800">Tasks</h1>
      ${active.length?`<div style="font-size:14px;color:var(--sub);margin-top:2px">${active.length} remaining</div>`:''}
    </div>
    <button class="fab" onclick="openTaskModal()" title="Add task">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="cards" style="padding-top:4px">`;

  if (S.tasks.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">🎯</div>
      <div class="empty-title">No tasks yet</div>
      <div class="empty-sub">Add one-off tasks with deadlines — they'll also show up on your Today tab when due.</div>
      <button class="empty-btn" onclick="openTaskModal()">+ Add Task</button>
    </div>`;
  } else {
    const grp = (items, label, cls='') => {
      if (!items.length) return '';
      return `<div class="tsec-head ${cls}">${label}</div>` + items.map(t => taskItemHTML(t, today)).join('');
    };
    html += grp(overdue,  `⚠️ Overdue (${overdue.length})`, 'tsec-overdue');
    html += grp(dueToday, '📌 Due Today');
    html += grp(upcoming, '📅 Upcoming');
    html += grp(noDate,   '· No Date');
    html += grp(done,     `✓ Done (${done.length})`, 'tsec-ok');
  }

  html += `</div>`;
  return html;
}

function toggleTaskDone(id) {
  S.tasks = S.tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  persist();
  render();
}

function deleteTask(id, name) {
  if (!confirm(`Delete "${name}"?`)) return;
  S.tasks = S.tasks.filter(t => t.id !== id);
  persist();
  render();
}

let _taskPriority = 'normal';
let _editTaskId   = null;

function openTaskModal() {
  _taskPriority = 'normal';
  _editTaskId   = null;
  renderTaskModal();
  openModal();
}

function editTask(id) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  _editTaskId   = id;
  _taskPriority = t.priority || 'normal';
  renderTaskModal(t);
  openModal();
}

function renderTaskModal(t) {
  const isEdit = !!t;
  const priMap = { normal:'none', low:'low', medium:'med', high:'high' };
  const p = _taskPriority;
  document.getElementById('modal').innerHTML = `<div class="modal-inner">
    <div class="modal-title">${isEdit ? 'Edit Task' : 'New Task'}</div>
    <div class="field-row" style="margin-bottom:20px">
      <input type="text" id="task-name-inp" placeholder="Task name…" style="flex:1"
        value="${isEdit ? esc(t.name) : ''}" onkeydown="if(event.key==='Enter')saveTask()">
    </div>
    <div class="time-label" style="margin-bottom:8px">Due date &amp; time (optional)</div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <input type="date" id="task-due-inp" value="${isEdit && t.dueDate ? t.dueDate : ''}"
        style="flex:1.4;font-size:15px;font-family:inherit;border:2px solid var(--border);border-radius:12px;padding:10px 12px;background:var(--bg);outline:none;color:var(--text)">
      <input type="time" id="task-time-inp" value="${isEdit && t.dueTime ? t.dueTime : ''}"
        style="flex:1;font-size:15px;font-family:inherit;border:2px solid var(--border);border-radius:12px;padding:10px 12px;background:var(--bg);outline:none;color:var(--text)">
    </div>
    <div class="time-label" style="margin-bottom:8px">Priority</div>
    <div style="display:flex;gap:8px;margin-bottom:24px">
      <button class="pri-btn ${p==='normal'?'active-none':''}" id="pri-none"   onclick="setTaskPriority('normal')">None</button>
      <button class="pri-btn ${p==='low'?'active-low':''}"     id="pri-low"    onclick="setTaskPriority('low')">🟢 Low</button>
      <button class="pri-btn ${p==='medium'?'active-med':''}"  id="pri-medium" onclick="setTaskPriority('medium')">🟠 Med</button>
      <button class="pri-btn ${p==='high'?'active-high':''}"   id="pri-high"   onclick="setTaskPriority('high')">🔴 High</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">${isEdit ? 'Save Changes' : 'Add Task'}</button>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('task-name-inp')?.focus(), 50);
}

function setTaskPriority(p) {
  _taskPriority = p;
  const map = { normal:'none', low:'low', medium:'med', high:'high' };
  ['none','low','medium','high'].forEach(id => {
    const btn = document.getElementById(`pri-${id}`);
    if (!btn) return;
    btn.className = 'pri-btn' + (_taskPriority === (id === 'none' ? 'normal' : id) ? ` active-${map[_taskPriority]}` : '');
  });
}

function saveTask() {
  const nameEl = document.getElementById('task-name-inp');
  const name   = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const dueDate = document.getElementById('task-due-inp').value  || null;
  const dueTime = document.getElementById('task-time-inp').value || null;
  let savedId;
  if (_editTaskId) {
    S.tasks = S.tasks.map(t => t.id === _editTaskId
      ? { ...t, name, dueDate, dueTime, priority: _taskPriority }
      : t);
    savedId = _editTaskId;
  } else {
    savedId = uid();
    S.tasks.push({ id: savedId, name, dueDate, dueTime, priority: _taskPriority, done: false });
  }
  persist();
  closeModal();
  render();
  // Prompt to add to Calendar if a due date was set
  if (dueDate) promptAddToCalendar(savedId);
}

function promptAddToCalendar(taskId) {
  const t = S.tasks.find(t => t.id === taskId);
  if (!t) return;
  const timeStr = t.dueTime ? ` at ${fmt12(t.dueTime)}` : ' at 9:00 AM';
  const [y,m,d] = t.dueDate.split('-').map(Number);
  const dateStr = `${MONTH_SHORT[m-1]} ${d}${timeStr}`;
  document.getElementById('modal').innerHTML = `<div class="modal-inner" style="text-align:center;padding-top:8px">
    <div style="font-size:44px;margin-bottom:12px">📅</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px">Add a reminder?</div>
    <div style="font-size:15px;color:var(--sub);line-height:1.6;margin-bottom:24px">
      <strong style="color:var(--text)">${esc(t.name)}</strong><br>
      due ${dateStr}
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Skip</button>
      <button class="btn-save"   onclick="closeModal();addTaskToCalendar('${taskId}')">Yes, remind me</button>
    </div>
  </div>`;
  openModal();
}

// ─── Mind / AI Chat ────────────────────────────────────────────────────────────
let _chatBusy = false;

CRITICAL RULES:

- add_habit             → data: {name, emoji}
- remove_habit          → data: {habitId, habitName}
- add_todo              → data: {name, priority ("normal"|"low"|"medium"|"high"), dueDate (YYYY-MM-DD or null)}
- mark_habit_done       → data: {habitId, habitName}
- mark_todo_done        → data: {taskId, taskName}

Use the exact IDs from the app data provided. Only output ONE action block per response.`;

function mdToHtml(text) {
  // Safe render: escape first, then apply light markdown
  return String(text)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function scrollChatToBottom() {
  requestAnimationFrame(() => {
    const screen = document.getElementById('screen');
    if (screen) screen.scrollTop = screen.scrollHeight;

function autoResize(el) {

async function sendChatMessage() {
  const inp = document.getElementById('chat-inp');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text || _chatBusy) return;
  _chatBusy = true;

  // Add user message to state
  S.chatMessages.push({ role: 'user', text });
  persist();
  inp.value = '';

  // Re-render to show user message, then show typing indicator
  const screen = document.getElementById('screen');
  screen.innerHTML = renderMind();
  scrollChatToBottom();
  const typingEl = document.getElementById('typing-indicator');
  if (typingEl) { typingEl.style.display = 'block'; scrollChatToBottom(); }
  const sendBtn = document.getElementById('chat-send');
  if (sendBtn) sendBtn.disabled = true;

  try {
    const reply = await callGemini();
    S.chatMessages.push({ role: 'ai', text: reply });
    // Keep last 40 messages max
    if (S.chatMessages.length > 40) S.chatMessages = S.chatMessages.slice(-40);
    persist();
  } catch(e) {
    console.error('Sage error:', e);
    // Always show the real error text so we can diagnose it
    const errMsg = `⚠️ ${e.message || 'Unknown error'}`;
    // isError flag prevents this from being sent back to the API as a fake model reply
    S.chatMessages.push({ role: 'ai', text: errMsg, isError: true });
    persist();
  }

  _chatBusy = false;
  if (S.tab === 'mind') {
    screen.innerHTML = renderMind();
    scrollChatToBottom();
  }
}

// ─── Calendar / ICS ───────────────────────────────────────────────────────────
function fmtICS(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;
}

function buildICS({ summary, description='', start, end, rrule='' }) {
  const alarm = `BEGIN:VALARM\nTRIGGER:-PT0M\nACTION:DISPLAY\nDESCRIPTION:${summary}\nEND:VALARM`;
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//My Routines//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${Date.now()}@myroutines`,
    `DTSTART:${fmtICS(start)}`,
    `DTEND:${fmtICS(end)}`,
    `SUMMARY:${summary}`,
    `DESCRIPTION:${description}`,
    rrule ? `RRULE:${rrule}` : '',
    alarm,
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
}

function downloadICS(name, content) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name.replace(/[^\w\s-]/g,'').trim() + '.ics';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  showToast('📅 Tap "Add" in Calendar to confirm');
}

// Task → one-off Calendar event
function addTaskToCalendar(id) {
  const t = S.tasks.find(t => t.id === id);
  if (!t) return;
  if (!t.dueDate) { showToast('Add a due date to this task first'); return; }
  const [y,m,d] = t.dueDate.split('-').map(Number);
  const [h,mn]  = t.dueTime ? t.dueTime.split(':').map(Number) : [9, 0];
  const start = new Date(y, m-1, d, h, mn, 0);
  const end   = new Date(start.getTime() + 15*60000);
  downloadICS(t.name, buildICS({
    summary: `📋 ${t.name}`,
    description: `Task${t.priority && t.priority!=='normal' ? ' · '+t.priority+' priority' : ''}`,
    start, end
  }));
}

// Routine → daily repeating Calendar event
function addRoutineToCalendar(id) {
  const r = S.routines.find(r => r.id === id);
  if (!r) return;
  if (!r.reminderTime) { showToast('Set a reminder time on this routine first'); return; }
  const [h,m] = r.reminderTime.split(':').map(Number);
  const now   = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  const end   = new Date(start.getTime() + 30*60000);
  downloadICS(r.name, buildICS({
    summary: `${r.emoji} ${r.name}`,
    description: 'Daily routine reminder · My Routines app',
    start, end, rrule: 'FREQ=DAILY'
  }));
}

// ─── Sage Actions ──────────────────────────────────────────────────────────────
function parseAction(text) {
  const match = text.match(/\[ACTION:([\s\S]*?)\]/);
  if (!match) return null;
  try { return JSON.parse(match[1]); } catch { return null; }
}

function stripAction(text) {
  return text.replace(/\[ACTION:[\s\S]*?\]/, '').trim();
}

function executeAction(action) {
  const d = action.data || {};
  switch (action.type) {
    case 'add_task_to_routine': {
      const r = S.routines.find(r => r.id === d.routineId);
      if (r) r.tasks.push({ id: uid(), name: d.taskName });
      break;
    }
    case 'remove_task_from_routine': {
      const r = S.routines.find(r => r.id === d.routineId);
      if (r) r.tasks = r.tasks.filter(t => t.id !== d.taskId && t.name !== d.taskName);
      break;
    }
    case 'add_habit':
      S.habits.push({ id: uid(), name: d.name, emoji: d.emoji || '✨', completedDates: [] });
      break;
    case 'remove_habit':
      S.habits = S.habits.filter(h => h.id !== d.habitId);
      break;
    case 'add_todo':
      S.tasks.push({ id: uid(), name: d.name, priority: d.priority || 'normal', done: false, dueDate: d.dueDate || null, dueTime: null });
      break;
    case 'mark_habit_done': {
      const today = todayKey();
      S.habits = S.habits.map(h => h.id === d.habitId && !h.completedDates.includes(today)
        ? { ...h, completedDates: [...h.completedDates, today] } : h);
      break;
    }
    case 'mark_todo_done':
      S.tasks = S.tasks.map(t => t.id === d.taskId ? { ...t, done: true } : t);
      break;
  }
  persist();
}

function confirmAction(idx) {
  const msg = S.chatMessages[idx];
  if (!msg) return;
  const action = parseAction(msg.text);
  if (action) executeAction(action);
  msg.actionState = 'done';
  persist();
  document.getElementById('screen').innerHTML = renderMind();
  scrollChatToBottom();
  showToast('✅ Done!');
}

function rejectAction(idx) {
  const msg = S.chatMessages[idx];
  if (!msg) return;
  msg.actionState = 'cancelled';
  persist();
  document.getElementById('screen').innerHTML = renderMind();
  scrollChatToBottom();
}

function buildAppContext() {
  const today = todayKey();
  const comp  = S.completions[today] || {};
  const lines = [`Today's date: ${today}`];

  // Routines progress (with IDs so Sage can target them in actions)
  if (S.routines.length) {
    lines.push('\nROUTINES (today):');
    S.routines.forEach(r => {
      const done  = r.tasks.filter(t => comp[r.id]?.[t.id]).length;
      const total = r.tasks.length;
      const pct   = total ? Math.round(done/total*100) : 0;
      lines.push(`  • ${r.emoji} ${r.name} [id:${r.id}]: ${done}/${total} tasks (${pct}%)`);
      r.tasks.forEach(t => lines.push(`      - ${t.name} [id:${t.id}]`));
    });
  }

  // Habits (with IDs)
  if (S.habits.length) {
    lines.push('\nHABITS:');
    const last7 = rptDays(7);
    S.habits.forEach(h => {
      const doneToday = h.completedDates.includes(today);
      const streak    = calcStreak(h.completedDates);
      const week      = last7.filter(d => h.completedDates.includes(d)).length;
      lines.push(`  • ${h.emoji} ${h.name} [id:${h.id}]: ${doneToday ? '✓ done today' : '✗ not yet today'}, streak ${streak}d, ${week}/7 this week`);
    });
  }

  // Tasks (with IDs)
  if (S.tasks.length) {
    const overdue  = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate < today);
    const dueToday = S.tasks.filter(t => !t.done && t.dueDate === today);
    const highPri  = S.tasks.filter(t => !t.done && t.priority === 'high');
    const pending  = S.tasks.filter(t => !t.done).length;
    const done     = S.tasks.filter(t =>  t.done).length;
    lines.push(`\nTASKS: ${done} done, ${pending} pending`);
    if (overdue.length)  lines.push(`  Overdue: ${overdue.map(t=>`${t.name} [id:${t.id}]`).join('; ')}`);
    if (dueToday.length) lines.push(`  Due today: ${dueToday.map(t=>`${t.name} [id:${t.id}]`).join('; ')}`);
    if (highPri.length)  lines.push(`  High priority: ${highPri.map(t=>`${t.name} [id:${t.id}]`).join('; ')}`);
  }

  // Today's meals
  const mKey = `w${mealCycleWeek()}-${todayDow()}`;
  const todayMeals = S.meals[mKey] || {};
  const mealParts = ['breakfast','lunch','dinner']
    .filter(s => todayMeals[s]?.length)
    .map(s => `${s}: ${[].concat(todayMeals[s]).join(', ')}`);
  if (mealParts.length) lines.push(`\nTODAY'S MEALS: ${mealParts.join(' | ')}`);

  return lines.join('\n');
}

async function callGemini() {
  // Build a properly alternating conversation (user → model → user → model…)
  // Filter errors, then merge any consecutive same-role messages
  const clean = S.chatMessages.filter(m => !m.isError);
  const contents = [];
  for (const m of clean) {
    const role = m.role === 'user' ? 'user' : 'model';
    if (contents.length && contents[contents.length - 1].role === role) {
      // merge consecutive same-role messages
      contents[contents.length - 1].parts[0].text += '\n' + m.text;
    } else {
      contents.push({ role, parts: [{ text: m.text }] });
    }
  }
  // Must start with a user turn
  if (contents.length && contents[0].role !== 'user') contents.shift();

  const systemText = SAGE_SYSTEM_PROMPT + '\n\n---\nUSER\'S LIVE APP DATA:\n' + buildAppContext();

  let res;
  if (S.aiProvider === 'openai') {
    // ── OpenAI ──────────────────────────────────────────────────────────────
    const oaiMessages = [
      { role: 'system', content: systemText },
      ...contents.map(m => ({ role: m.role === 'model' ? 'assistant' : m.role, content: m.parts[0].text }))
    ];
    res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${S.openaiKey.trim()}` },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: oaiMessages, max_tokens: 2048, temperature: 0.75 })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `OpenAI error ${res.status}`);
    }
    const data = await res.json();
    const text = data?.choices?.[0]?.message?.content;
    if (!text) throw new Error('No response from OpenAI');
    return text;

  } else {
    // ── Gemini ───────────────────────────────────────────────────────────────
    res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${S.geminiKey.trim()}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemText }] },
          contents,
          generationConfig: { temperature: 0.75, maxOutputTokens: 2048, topP: 0.95 }
        })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Gemini error ${res.status}`);
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('No response from Gemini');
    return text;
  }
}

// ─── Notifications ─────────────────────────────────────────────────────────────
let _notifInterval = null;

function initNotifications() {
  checkTasksOnOpen();          // immediate on-open task check (toast only)
  checkNotifications();        // immediate check in case we opened exactly at reminder time
  clearInterval(_notifInterval);
  _notifInterval = setInterval(checkNotifications, 60000); // every minute
}

function checkNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const now  = new Date();
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const today = todayKey();

  // Load + clean old fired keys (only keep today's)
  let fired = {};
  try { fired = JSON.parse(localStorage.getItem('notifFired') || '{}'); } catch(e) {}
  Object.keys(fired).forEach(k => { if (!k.endsWith(today)) delete fired[k]; });

  // 1. Routine reminders
  S.routines.forEach(r => {
    if (!r.reminderTime) return;
    const key = `r-${r.id}-${today}`;
    if (fired[key]) return;
    if (r.reminderTime === hhmm) {
      const title = `${r.emoji || '⏰'} ${r.name}`;
      fireNotif(title, 'Time to start your routine!', key);
      fired[key] = 1;
    }
  });

  // 2. Habit reminder (fires if habits unfinished at the set time)
  const habitKey = `habits-${today}`;
  if (!fired[habitKey] && hhmm === (S.notifHabitTime || '20:00')) {
    const undone = S.habits.filter(h => !h.completedDates.includes(today));
    if (undone.length > 0) {
      const preview = undone.slice(0,2).map(h => h.name).join(', ')
                    + (undone.length > 2 ? ` +${undone.length-2} more` : '');
      fireNotif('🌟 Habit Check-in',
        `${undone.length} habit${undone.length>1?'s':''} left: ${preview}`, habitKey);
      fired[habitKey] = 1;
    }
  }

  // 3. Task alert at 9 am
  const taskKey = `tasks-${today}`;
  if (!fired[taskKey] && hhmm === '09:00') {
    const due = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate <= today);
    if (due.length > 0) {
      fireNotif('🎯 Tasks Due Today',
        `${due.length} task${due.length>1?'s':''} need your attention`, taskKey);
      fired[taskKey] = 1;
    }
  }

  localStorage.setItem('notifFired', JSON.stringify(fired));
}

function checkTasksOnOpen() {
  const today  = todayKey();
  const overdue  = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate <  today).length;
  const dueToday = S.tasks.filter(t => !t.done && t.dueDate && t.dueDate === today).length;
  if (overdue + dueToday === 0) return;
  const msg = overdue > 0
    ? `🎯 ${overdue} overdue · ${dueToday} due today`
    : `🎯 ${dueToday} task${dueToday>1?'s':''} due today`;
  showToast(msg, 4500);
}

function fireNotif(title, body, tag) {
  try {
    new Notification(title, {
      body, tag,
      icon: '/routine-builder-tracker-app/manifest.json',
      silent: false,
    });
  } catch(e) {
    showToast(`${title} — ${body}`, 5000);
  }
}

function showToast(msg, duration) {
  duration = duration || 3200;
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), duration);
}

async function requestNotifPermission() {
  if (!('Notification' in window)) {
    alert('This browser does not support notifications.\nTip: Add the app to your Home Screen first, then try again.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    showToast('✅ Notifications enabled!');
    initNotifications();
  } else if (perm === 'denied') {
    showToast('⛔ Blocked — enable in device Settings', 5000);
  }
  openSettingsModal(); // refresh to show updated status
}

function exportBackup() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    routines: S.routines,
    habits: S.habits,
    completions: S.completions,
    meals: S.meals,
    tasks: S.tasks,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `my-routines-${todayKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup() {
  const input  = document.createElement('input');
  input.type   = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm('This will replace all your current data with the backup. Continue?')) return;
        if (Array.isArray(data.routines))                              S.routines    = data.routines;
        if (Array.isArray(data.habits))                                S.habits      = data.habits;
        if (data.completions && typeof data.completions === 'object')  S.completions = data.completions;
        if (data.meals       && typeof data.meals       === 'object')  S.meals       = data.meals;
        if (Array.isArray(data.tasks))                                 S.tasks       = data.tasks;
        persist();
        closeModal();
        render();
        alert('Backup restored successfully!');
      } catch {
        alert('Could not read the file. Make sure it\'s a valid backup.');
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

// ─── Modal helpers ─────────────────────────────────────────────────────────────
function openModal() {

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─── Escape HTML ───────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  ctx.arcTo(180,180,180-r,180,r); ctx.lineTo(r,180);
  ctx.arcTo(0,180,0,180-r,r); ctx.lineTo(0,r);
  ctx.arcTo(0,0,r,0,r); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 96px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', 90, 95);
